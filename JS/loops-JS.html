<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
    //loops-executable block of code repeated;y until a specific conditions come

    let studentList=["Gauri","Rashi","Avi","Vinay",23,3453];

    //for loop
    for(let i=0; i<studentList.length;i++){
        console.log(studentList[i]);
    }

    //while loop
    let i=0;
    while(i<studentList.length)
    {
        console.log(studentList[i]);
        i++;
    }


    //for of loop-loops that iterate over the iterable object like array strings
    for(let x of studentList)
    {
        console.log(x);
    }

    //for in loop:iterate over properties of object ,its recommended for objects rather than array
    
   </script> 
</body>
</html>
