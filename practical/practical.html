<!DOCTYPE html>
<html>
<head>
<title>Student Marks & Grade Calculator</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

.container{
    width:400px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input,button{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    background:blue;
    color:white;
    border:none;
}

#result{
    margin-top:20px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="container">

<h2>Student Marks & Grade Calculator</h2>

<input type="number" id="subjects"
placeholder="Enter Number of Subjects">

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

</div>

<script>

function calculate(){

let n =
Number(document.getElementById("subjects").value);

let total = 0;

for(let i=1;i<=n;i++){

let marks =
Number(prompt("Enter Marks for Subject "+i));

total += marks;

}

let average = total / n;

let grade="";
let result="";

if(average>=90){
grade="A+";
result="PASS";
}

else if(average>=75){
grade="A";
result="PASS";
}

else if(average>=60){
grade="B";
result="PASS";
}

else if(average>=40){
grade="C";
result="PASS";
}

else{
grade="F";
result="FAIL";
}

document.getElementById("result").innerHTML=`
<h3>Total Marks: ${total}</h3>
<h3>Average: ${average.toFixed(2)}</h3>
<h3>Grade: ${grade}</h3>
<h3>Result: ${result}</h3>
`;

}

</script>

</body>
</html>
